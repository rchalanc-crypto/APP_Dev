name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build _site
        run: |
          mkdir -p _site
          cp -r apps _site/apps
          if [ -d shared ]; then cp -r shared _site/shared; fi
          if [ -f index.html ]; then
            cp index.html _site/index.html
          else
            echo '<meta http-equiv="refresh" content="0;url=apps/nassims-folly/">' > _site/index.html
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
